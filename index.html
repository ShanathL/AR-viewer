<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D & AR Viewer</title>
    
    <!-- Import the model-viewer web component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f9; 
            font-family: sans-serif;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
        }

        .viewer-container {
            width: 100%;
            max-width: 800px;
            height: 60vh;
            min-height: 400px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* The actual 3D viewer element */
        model-viewer { 
            width: 100%; 
            height: 100%; 
        }

        /* Styling for the AR Button */
        .ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            border: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }

        .ar-button:hover {
            background-color: #0056b3;
        }

        /* Hide the button on devices that don't support AR */
        model-viewer::part(default-ar-button) {
            display: none;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <!-- 
          src: The GLB file for Web and Android
          ios-src: The USDZ file for Apple AR Quick Look
          ar: Enables AR functionality
          camera-controls: Allows user to spin and zoom the 3D model
        -->
        <model-viewer 
            src="./models/x7f9a2p.glb" 
            ios-src="./models/x7f9a2p.usdz"
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            auto-rotate
            shadow-intensity="1"
            alt="An interactive 3D model">
            
            <!-- Custom AR Button -->
            <button slot="ar-button" class="ar-button">
                👁️ View in AR
            </button>
        </model-viewer>
    </div>

</body>
</html>
